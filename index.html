<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Overmind</title>
  <meta name="description" content="The Overmind is an agentic wrapper for OpenRouter models.">
  <link rel="canonical" href="https://rijmc17.github.io/TheOvermind/">

  <!-- Favicons / app icons. Use absolute URLs so crawlers do not have to guess paths on GitHub Pages. -->
  <link rel="shortcut icon" href="https://rijmc17.github.io/TheOvermind/favicon.ico">
  <link rel="icon" href="https://rijmc17.github.io/TheOvermind/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="https://rijmc17.github.io/TheOvermind/assets/the-overmind-icon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://rijmc17.github.io/TheOvermind/assets/the-overmind-icon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="https://rijmc17.github.io/TheOvermind/assets/the-overmind-icon-48.png">
  <link rel="icon" type="image/png" sizes="192x192" href="https://rijmc17.github.io/TheOvermind/assets/the-overmind-icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://rijmc17.github.io/TheOvermind/apple-touch-icon.png">
  <link rel="manifest" href="https://rijmc17.github.io/TheOvermind/manifest.webmanifest">

  <!-- Open graph image is square on purpose; OpenRouter/app scrapers often want an icon, not a wide banner. -->
  <meta property="og:title" content="The Overmind">
  <meta property="og:description" content="Agentic wrapper for OpenRouter models.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rijmc17.github.io/TheOvermind/">
  <meta property="og:image" content="https://rijmc17.github.io/TheOvermind/openrouter_app_icon_512.png">
  <meta property="og:image:secure_url" content="https://rijmc17.github.io/TheOvermind/openrouter_app_icon_512.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:image:alt" content="The Overmind icon">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="The Overmind">
  <meta name="twitter:description" content="Agentic wrapper for OpenRouter models.">
  <meta name="twitter:image" content="https://rijmc17.github.io/TheOvermind/openrouter_app_icon_512.png">
  <meta name="theme-color" content="#0f0f10">

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, #272222 0, #111 48%, #060606 100%);
      color: #f1f1f1;
      font-family: Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    main { text-align: center; padding: 2rem; max-width: 720px; }
    img { width: min(280px, 68vw); height: auto; filter: drop-shadow(0 18px 36px rgba(0,0,0,.55)); }
    h1 { font-size: clamp(2.2rem, 6vw, 4.5rem); margin: 1.2rem 0 .25rem; }
    p { color: #c8c8c8; font-size: 1.15rem; line-height: 1.5; }
    a { color: #ff8b3d; }
  </style>
</head>
<body>
  <main>
    <img src="https://rijmc17.github.io/TheOvermind/openrouter_app_icon_512.png" alt="The Overmind icon">
    <h1>The Overmind</h1>
    <p>Agentic wrapper for OpenRouter models.</p>
    <p><a href="https://github.com/rijmc17/TheOvermind">View the GitHub repository</a></p>
  </main>
</body>
</html>
